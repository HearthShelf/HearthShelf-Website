# Cloudflare Pages configuration
name = "hearthshelf-website"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Build-time environment variables. When a wrangler.toml is present, CF Pages
# reads build config from here, so the dashboard "Variables and secrets" panel
# does NOT feed the Vite build - these [vars] do. Vite inlines VITE_* at build
# time. The Clerk publishable key is public (it ships in the browser bundle),
# so it is safe to commit; the Clerk SECRET key must never go here.
[vars]
VITE_CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsuaGVhcnRoc2hlbGYuY29tJA"
VITE_CLERK_SIGN_IN_URL = "/sign-in"
VITE_CLERK_SIGN_UP_URL = "/sign-up"
VITE_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL = "/"
VITE_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL = "/"
